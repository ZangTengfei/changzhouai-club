services:
  web:
    build:
      context: .
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
    image: changzhouai-club-web:local
    env_file:
      - .env.selfhost.local
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
